jobs:
  build:
    runs-on: ubuntu-latest
    # Set the default working directory for all 'run' commands
    defaults:
      run:
        working-directory: ./vogon-poetry-concept-viewer
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24 # Updated from 20 to resolve deprecation warnings
          cache: npm
          # Explicitly point to the lock file in the subdirectory
          cache-dependency-path: ./vogon-poetry-concept-viewer/package-lock.json

      - run: npm ci

      - run: npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          # Explicitly point to the build output in the subdirectory
          path: ./vogon-poetry-concept-viewer/dist