name: Deploy Concept Viewer

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./vogon-poetry-concept-viewer
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: ./vogon-poetry-concept-viewer/package-lock.json

      - run: npm ci

      - run: npm run build

      # Stage files to match the target URL structure
      - name: Structure Artifact
        run: |
          mkdir -p deploy_staging/vogon-poetry-concept-viewer
          cp -r dist/* deploy_staging/vogon-poetry-concept-viewer/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./vogon-poetry-concept-viewer/deploy_staging

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4